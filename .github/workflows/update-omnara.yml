name: update-omnara

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run updater
        id: update
        run: nix shell nixpkgs#curl nixpkgs#jq nixpkgs#python3 -c ./scripts/update-omnara.sh

      - name: Build updated package
        if: steps.update.outputs.UPDATED == 'true'
        run: nix build .#omnara

      - name: Commit and push
        if: steps.update.outputs.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add default.nix
          git commit -m "omnara: update to ${{ steps.update.outputs.VERSION }}"
          git push
